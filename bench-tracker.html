<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Жим лёжа — трекер</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.3px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #666; cursor: pointer; font-size: 14px; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .card { background: #fff; border-radius: 10px; padding: 14px; border: 1px solid #e8e8e8; }
  .card-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .card-value { font-size: 22px; font-weight: 600; }

  .form-box { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 16px; }
  label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  input, select { width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; color: #1a1a1a; background: #fafafa; }
  input:focus, select:focus { outline: none; border-color: #999; background: #fff; }

  .sets-header { display: grid; grid-template-columns: 40px 1fr 1fr 1fr 32px; gap: 8px; align-items: center; margin: 14px 0 6px; }
  .sets-header span { font-size: 11px; color: #888; text-align: center; }
  .set-row { display: grid; grid-template-columns: 40px 1fr 1fr 1fr 32px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .set-num { font-size: 12px; color: #888; text-align: center; font-weight: 500; }
  .del-btn { border: none; background: none; color: #ccc; cursor: pointer; font-size: 20px; padding: 0; line-height: 1; display: flex; align-items: center; justify-content: center; }
  .del-btn:hover { color: #999; }

  .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn { padding: 9px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; border: 1px solid #ddd; background: #fff; color: #1a1a1a; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn:active { transform: scale(0.98); }

  .workout-item { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 14px; margin-bottom: 10px; }
  .workout-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .workout-date { font-weight: 600; font-size: 15px; }
  .workout-meta { font-size: 12px; color: #888; }
  .set-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .set-pill { background: #f5f5f0; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #555; }
  .set-pill.rir0 { background: #fff0f0; color: #c44; }
  .set-pill.rir1 { background: #fffbf0; color: #a86; }

  .chart-section { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 16px; margin-bottom: 14px; }
  .chart-title { font-size: 12px; color: #888; margin-bottom: 12px; }
  .chart-area { position: relative; width: 100%; overflow-x: auto; }
  svg.chart { width: 100%; }

  .tip { background: #f0f7ff; border-radius: 10px; padding: 12px 14px; margin-bottom: 20px; font-size: 13px; color: #2a5a9a; border: 1px solid #d0e5ff; }
  .tip strong { font-weight: 600; }

  .status { font-size: 13px; color: #888; padding: 8px 0; }
  .empty { text-align: center; color: #aaa; font-size: 14px; padding: 40px 0; }

  @media (max-width: 400px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    .card-value { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Жим лёжа</h1>
  <div class="tabs">
    <button class="tab active" onclick="setView('log')">Запись</button>
    <button class="tab" onclick="setView('history')">История</button>
    <button class="tab" onclick="setView('charts')">Графики</button>
  </div>
  <div id="content"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ======================================================
// ВСТАВЬ СЮДА СВОИ КЛЮЧИ ИЗ FIREBASE CONSOLE
// ======================================================
const firebaseConfig = {
  apiKey: "ВСТАВЬ_API_KEY",
  authDomain: "ВСТАВЬ_AUTH_DOMAIN",
  projectId: "ВСТАВЬ_PROJECT_ID",
  storageBucket: "ВСТАВЬ_STORAGE_BUCKET",
  messagingSenderId: "ВСТАВЬ_SENDER_ID",
  appId: "ВСТАВЬ_APP_ID"
};
// ======================================================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let workouts = [];
let currentView = 'log';

let formData = {
  date: new Date().toISOString().slice(0,10),
  sets: [
    {weight:'82.5', reps:'7', rir:'2'},
    {weight:'82.5', reps:'6', rir:'1'},
    {weight:'82.5', reps:'6', rir:'0'},
  ]
};

async function loadWorkouts() {
  const q = query(collection(db, 'workouts'), orderBy('date', 'asc'));
  const snap = await getDocs(q);
  workouts = [];
  snap.forEach(d => workouts.push({id: d.id, ...d.data()}));
  render();
}

async function saveWorkout() {
  const sets = formData.sets.map(s => ({
    weight: parseFloat(s.weight) || 0,
    reps: parseInt(s.reps) || 0,
    rir: parseInt(s.rir)
  }));
  const volume = sets.reduce((sum, s) => sum + s.weight * s.reps, 0);
  const doc_data = { date: formData.date, sets, volume, createdAt: Date.now() };
  await addDoc(collection(db, 'workouts'), doc_data);
  await loadWorkouts();
  showToast('Тренировка сохранена');
}

async function deleteWorkout(id) {
  await deleteDoc(doc(db, 'workouts', id));
  await loadWorkouts();
}

function calcMax(sets) {
  return sets.length ? Math.max(...sets.map(s => s.weight)) : 0;
}

function getNextGoal() {
  if (!workouts.length) return null;
  const last = workouts[workouts.length - 1];
  const sets = last.sets;
  const maxW = calcMax(sets);
  const allAt8 = sets.every(s => s.reps >= 8);
  if (allAt8) return `Добавь 2.5кг → начни с ${(maxW + 2.5).toFixed(1)}кг × 6`;
  const minReps = Math.min(...sets.map(s => s.reps));
  return `Цель: добрать до 8 повторений (сейчас минимум ${minReps})`;
}

function formatDate(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('ru-RU', {day:'2-digit', month:'short'});
}

function getWeeklyData() {
  const map = {};
  workouts.forEach(w => {
    const d = new Date(w.date + 'T12:00:00');
    const day = d.getDay() || 7;
    d.setDate(d.getDate() - day + 1);
    const wk = d.toISOString().slice(0,10);
    if (!map[wk]) map[wk] = {week: wk, volume: 0, sessions: 0};
    map[wk].volume += w.volume;
    map[wk].sessions++;
  });
  return Object.values(map).sort((a,b) => a.week.localeCompare(b.week));
}

function drawLineChart(data, valueKey, color) {
  if (data.length < 2) return '<div class="empty" style="padding:20px 0">Нужно минимум 2 тренировки</div>';
  const values = data.map(d => d[valueKey]);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const W = 540, H = 160, pad = {t:10, r:10, b:30, l:50};
  const iW = W - pad.l - pad.r;
  const iH = H - pad.t - pad.b;
  const xs = data.map((_, i) => pad.l + (i / (data.length - 1)) * iW);
  const ys = values.map(v => pad.t + (1 - (v - min) / range) * iH);
  let path = xs.map((x,i) => `${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  let dots = xs.map((x,i) => `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="4" fill="${color}"/>`).join('');
  let labels = data.map((d,i) => {
    if (data.length <= 8 || i % Math.ceil(data.length/8) === 0 || i === data.length-1)
      return `<text x="${xs[i].toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="10" fill="#aaa">${d.label||formatDate(d.week||d.date)}</text>`;
    return '';
  }).join('');
  let yLabels = [min, min + range/2, max].map(v => {
    const y = pad.t + (1 - (v - min) / range) * iH;
    return `<text x="${pad.l - 6}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="10" fill="#aaa">${Math.round(v)}</text>`;
  }).join('');
  return `<div class="chart-area"><svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    ${yLabels}${labels}
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
  </svg></div>`;
}

function drawBarChart(data, valueKey, color) {
  if (!data.length) return '';
  const values = data.map(d => d[valueKey]);
  const max = Math.max(...values);
  const W = 540, H = 160, pad = {t:10, r:10, b:30, l:50};
  const iW = W - pad.l - pad.r;
  const iH = H - pad.t - pad.b;
  const bW = Math.min(40, iW / data.length - 4);
  let bars = data.map((d, i) => {
    const x = pad.l + (i + 0.5) / data.length * iW - bW/2;
    const bH = (d[valueKey] / max) * iH;
    const y = pad.t + iH - bH;
    const label = d.label || formatDate(d.week || d.date);
    const showLabel = data.length <= 8 || i % Math.ceil(data.length/8) === 0 || i === data.length-1;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bW}" height="${bH.toFixed(1)}" fill="${color}" rx="3"/>
      ${showLabel ? `<text x="${(x + bW/2).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="10" fill="#aaa">${label}</text>` : ''}`;
  }).join('');
  const yLabels = [0, Math.round(max/2), Math.round(max)].map(v => {
    const y = pad.t + (1 - v/max) * iH;
    return `<text x="${pad.l-6}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="10" fill="#aaa">${v}</text>`;
  }).join('');
  return `<div class="chart-area"><svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    ${yLabels}${bars}
  </svg></div>`;
}

function render() {
  const total = workouts.length;
  const maxEver = total ? Math.max(...workouts.map(w => calcMax(w.sets))) : 0;
  const totalVol = Math.round(workouts.reduce((s,w) => s + w.volume, 0));
  const goal = getNextGoal();

  const stats = `<div class="cards">
    <div class="card"><div class="card-label">Тренировок</div><div class="card-value">${total}</div></div>
    <div class="card"><div class="card-label">Макс. вес</div><div class="card-value">${maxEver ? maxEver+'кг' : '—'}</div></div>
    <div class="card"><div class="card-label">Тоннаж всего</div><div class="card-value">${totalVol ? totalVol+'кг' : '—'}</div></div>
  </div>`;

  const goalTip = goal ? `<div class="tip"><strong>Следующая цель:</strong> ${goal}</div>` : '';

  if (currentView === 'log') {
    const setsHTML = formData.sets.map((s,i) => `
      <div class="set-row">
        <div class="set-num">П${i+1}</div>
        <input type="number" value="${s.weight}" step="2.5" min="20" max="200" onchange="updateSet(${i},'weight',this.value)" placeholder="82.5">
        <input type="number" value="${s.reps}" step="1" min="1" max="30" onchange="updateSet(${i},'reps',this.value)" placeholder="8">
        <select onchange="updateSet(${i},'rir',this.value)">
          ${['0','1','2','3'].map(r => `<option value="${r}" ${s.rir===r?'selected':''}>${r===r?'RIR '+r:''}</option>`).join('')}
        </select>
        <button class="del-btn" onclick="removeSet(${i})">×</button>
      </div>`).join('');

    document.getElementById('content').innerHTML = stats + goalTip + `
      <div class="form-box">
        <div style="margin-bottom:12px">
          <label>Дата</label>
          <input type="date" value="${formData.date}" onchange="updateDate(this.value)" style="width:auto">
        </div>
        <div class="sets-header">
          <span></span><span>Вес (кг)</span><span>Повторы</span><span>RIR</span><span></span>
        </div>
        ${setsHTML}
        <div class="btn-row">
          <button class="btn" onclick="addSet()">+ подход</button>
          <button class="btn btn-primary" onclick="doSave()">Сохранить</button>
        </div>
      </div>`;
  }

  else if (currentView === 'history') {
    const items = [...workouts].reverse().map(w => {
      const pills = w.sets.map((s,i) =>
        `<div class="set-pill ${s.rir===0?'rir0':s.rir===1?'rir1':''}">${s.weight}кг × ${s.reps} · RIR${s.rir}</div>`
      ).join('');
      return `<div class="workout-item">
        <div class="workout-header">
          <div class="workout-date">${new Date(w.date+'T12:00:00').toLocaleDateString('ru-RU',{day:'2-digit',month:'long'})}</div>
          <div style="display:flex;gap:12px;align-items:center">
            <div class="workout-meta">Тоннаж: ${Math.round(w.volume)}кг</div>
            <button onclick="doDelete('${w.id}')" style="border:none;background:none;color:#ccc;cursor:pointer;font-size:13px">удалить</button>
          </div>
        </div>
        <div class="set-pills">${pills}</div>
      </div>`;
    }).join('');
    document.getElementById('content').innerHTML = stats +
      (workouts.length ? items : '<div class="empty">Нет записей. Начни с первой тренировки!</div>');
  }

  else if (currentView === 'charts') {
    const sessionData = workouts.map(w => ({
      label: formatDate(w.date),
      maxWeight: calcMax(w.sets),
      volume: Math.round(w.volume),
      sets: w.sets.length
    }));
    const weeklyData = getWeeklyData().map(d => ({...d, volume: Math.round(d.volume)}));

    document.getElementById('content').innerHTML = stats + `
      <div class="chart-section">
        <div class="chart-title">Прогрессия веса (кг)</div>
        ${drawLineChart(sessionData, 'maxWeight', '#185FA5')}
      </div>
      <div class="chart-section">
        <div class="chart-title">Тоннаж за тренировку (кг)</div>
        ${drawBarChart(sessionData, 'volume', '#1D9E75')}
      </div>
      <div class="chart-section">
        <div class="chart-title">Объём по неделям (кг)</div>
        ${drawBarChart(weeklyData, 'volume', '#533AB7')}
      </div>`;
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:'#1a1a1a',color:'#fff',padding:'10px 20px',borderRadius:'8px',fontSize:'14px',zIndex:999});
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

window.setView = function(v) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[['log','history','charts'].indexOf(v)].classList.add('active');
  render();
};
window.updateDate = v => { formData.date = v; render(); };
window.updateSet = (i, field, val) => { formData.sets[i][field] = val; };
window.addSet = () => {
  const last = formData.sets[formData.sets.length-1];
  formData.sets.push({weight: last.weight, reps: last.reps, rir: '0'});
  render();
};
window.removeSet = i => {
  if (formData.sets.length > 1) { formData.sets.splice(i,1); render(); }
};
window.doSave = saveWorkout;
window.doDelete = deleteWorkout;

loadWorkouts();
</script>
</body>
</html>
