<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Жим лёжа — трекер</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.3px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #666; cursor: pointer; font-size: 14px; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .card { background: #fff; border-radius: 10px; padding: 14px; border: 1px solid #e8e8e8; }
  .card-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .card-value { font-size: 22px; font-weight: 600; }
  .form-box { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 16px; }
  label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  input, select { width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; color: #1a1a1a; background: #fafafa; }
  input:focus, select:focus { outline: none; border-color: #999; background: #fff; }
  .sets-header { display: grid; grid-template-columns: 40px 1fr 1fr 1fr 32px; gap: 8px; align-items: center; margin: 14px 0 6px; }
  .sets-header span { font-size: 11px; color: #888; text-align: center; }
  .set-row { display: grid; grid-template-columns: 40px 1fr 1fr 1fr 32px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .set-num { font-size: 12px; color: #888; text-align: center; font-weight: 500; }
  .del-btn { border: none; background: none; color: #ccc; cursor: pointer; font-size: 20px; padding: 0; line-height: 1; display: flex; align-items: center; justify-content: center; }
  .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn { padding: 9px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; border: 1px solid #ddd; background: #fff; color: #1a1a1a; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .workout-item { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 14px; margin-bottom: 10px; }
  .workout-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .workout-date { font-weight: 600; font-size: 15px; }
  .workout-meta { font-size: 12px; color: #888; }
  .set-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .set-pill { background: #f5f5f0; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #555; }
  .set-pill.rir0 { background: #fff0f0; color: #c44; }
  .set-pill.rir1 { background: #fffbf0; color: #a86; }
  .chart-section { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 16px; margin-bottom: 14px; }
  .chart-title { font-size: 12px; color: #888; margin-bottom: 12px; }
  .tip { background: #f0f7ff; border-radius: 10px; padding: 12px 14px; margin-bottom: 20px; font-size: 13px; color: #2a5a9a; border: 1px solid #d0e5ff; }
  .tip strong { font-weight: 600; }
  .empty { text-align: center; color: #aaa; font-size: 14px; padding: 40px 0; }
  .error-box { background: #fff0f0; border: 1px solid #fcc; border-radius: 10px; padding: 14px; margin-bottom: 16px; font-size: 13px; color: #c33; }
  @media (max-width: 400px) { .cards { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="container">
  <h1>Жим лёжа</h1>
  <div class="tabs">
    <button class="tab active" onclick="setView('log')">Запись</button>
    <button class="tab" onclick="setView('history')">История</button>
    <button class="tab" onclick="setView('charts')">Графики</button>
  </div>
  <div id="content"></div>
</div>

<script>
// =====================================================
// ВСТАВЬ СВОЙ ANON KEY СЮДА (строка ниже)
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqeGNuZmppaHFremt4dG90YnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzczNTUsImV4cCI6MjA5Mjg1MzM1NX0.V1v-yk5q2C4WqUX1ySrLi239JUqrIYrVl9gNlDn_EOI';
// =====================================================
const SUPABASE_URL = 'https://ejxcnfjihqkzkxtotbyl.supabase.co';
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Prefer': 'return=representation'
};

let workouts = [];
let currentView = 'log';
let formData = {
  date: new Date().toISOString().slice(0,10),
  sets: [
    {weight:'82.5', reps:'7', rir:'2'},
    {weight:'82.5', reps:'6', rir:'1'},
    {weight:'82.5', reps:'6', rir:'0'},
  ]
};

async function apiGet() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/workouts?select=*&order=date.asc`, {headers: HEADERS});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function apiInsert(data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/workouts`, {method:'POST', headers: HEADERS, body: JSON.stringify(data)});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function apiDelete(id) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/workouts?id=eq.${id}`, {method:'DELETE', headers: HEADERS});
  if (!r.ok) throw new Error(await r.text());
}

async function loadWorkouts() {
  try {
    const data = await apiGet();
    workouts = data.map(r => ({
      id: r.id,
      date: r.date,
      sets: typeof r.sets === 'string' ? JSON.parse(r.sets) : r.sets,
      volume: r.volume
    }));
  } catch(e) {
    showError('Ошибка загрузки: ' + e.message);
  }
  render();
}

async function saveWorkout() {
  const sets = formData.sets.map(s => ({
    weight: parseFloat(s.weight) || 0,
    reps: parseInt(s.reps) || 0,
    rir: parseInt(s.rir)
  }));
  const volume = sets.reduce((sum, s) => sum + s.weight * s.reps, 0);
  try {
    await apiInsert({date: formData.date, sets: JSON.stringify(sets), volume});
    await loadWorkouts();
    showToast('Тренировка сохранена ✓');
  } catch(e) {
    showError('Ошибка сохранения: ' + e.message);
  }
}

async function deleteWorkout(id) {
  try {
    await apiDelete(id);
    await loadWorkouts();
  } catch(e) {
    showError('Ошибка удаления: ' + e.message);
  }
}

function calcMax(sets) { return sets.length ? Math.max(...sets.map(s => s.weight)) : 0; }

function getNextGoal() {
  if (!workouts.length) return null;
  const last = workouts[workouts.length-1];
  const maxW = calcMax(last.sets);
  const allAt8 = last.sets.every(s => s.reps >= 8);
  if (allAt8) return `Добавь 2.5кг → начни с ${(maxW+2.5).toFixed(1)}кг × 6`;
  const minReps = Math.min(...last.sets.map(s => s.reps));
  return `Цель: добрать до 8 повторений во всех подходах (сейчас минимум ${minReps})`;
}

function formatDate(dateStr) {
  return new Date(dateStr+'T12:00:00').toLocaleDateString('ru-RU',{day:'2-digit',month:'short'});
}

function getWeeklyData() {
  const map = {};
  workouts.forEach(w => {
    const d = new Date(w.date+'T12:00:00');
    const day = d.getDay()||7;
    d.setDate(d.getDate()-day+1);
    const wk = d.toISOString().slice(0,10);
    if (!map[wk]) map[wk]={week:wk,volume:0,sessions:0};
    map[wk].volume += w.volume;
    map[wk].sessions++;
  });
  return Object.values(map).sort((a,b)=>a.week.localeCompare(b.week));
}

function drawLine(data, key, color) {
  if (data.length < 2) return '<div class="empty" style="padding:16px 0">Нужно минимум 2 тренировки</div>';
  const vals = data.map(d=>d[key]);
  const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx-mn||1;
  const W=520,H=150,pl=44,pr=8,pt=8,pb=28,iW=W-pl-pr,iH=H-pt-pb;
  const xs=data.map((_,i)=>pl+i/(data.length-1)*iW);
  const ys=vals.map(v=>pt+(1-(v-mn)/rng)*iH);
  const path=xs.map((x,i)=>`${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const dots=xs.map((x,i)=>`<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="4" fill="${color}"/>`).join('');
  const lbls=data.map((d,i)=>{
    if(data.length<=7||i%Math.ceil(data.length/7)===0||i===data.length-1)
      return `<text x="${xs[i].toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="10" fill="#aaa">${d.label||formatDate(d.week)}</text>`;
    return '';
  }).join('');
  const yLbls=[mn,mn+rng/2,mx].map(v=>{
    const y=pt+(1-(v-mn)/rng)*iH;
    return `<text x="${pl-4}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="10" fill="#aaa">${Math.round(v)}</text>`;
  }).join('');
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${yLbls}${lbls}<path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
}

function drawBars(data, key, color) {
  if (!data.length) return '';
  const vals=data.map(d=>d[key]);
  const mx=Math.max(...vals)||1;
  const W=520,H=150,pl=44,pr=8,pt=8,pb=28,iW=W-pl-pr,iH=H-pt-pb;
  const bW=Math.min(36,iW/data.length-4);
  const bars=data.map((d,i)=>{
    const x=pl+(i+0.5)/data.length*iW-bW/2;
    const bH=(d[key]/mx)*iH; const y=pt+iH-bH;
    const show=data.length<=7||i%Math.ceil(data.length/7)===0||i===data.length-1;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bW}" height="${bH.toFixed(1)}" fill="${color}" rx="3"/>
      ${show?`<text x="${(x+bW/2).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="10" fill="#aaa">${d.label||formatDate(d.week)}</text>`:''}`;
  }).join('');
  const yLbls=[0,Math.round(mx/2),Math.round(mx)].map(v=>{
    const y=pt+(1-v/mx)*iH;
    return `<text x="${pl-4}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="10" fill="#aaa">${v}</text>`;
  }).join('');
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${yLbls}${bars}</svg>`;
}

function render() {
  const total=workouts.length;
  const maxEver=total?Math.max(...workouts.map(w=>calcMax(w.sets))):0;
  const totalVol=Math.round(workouts.reduce((s,w)=>s+w.volume,0));
  const goal=getNextGoal();

  const stats=`<div class="cards">
    <div class="card"><div class="card-label">Тренировок</div><div class="card-value">${total}</div></div>
    <div class="card"><div class="card-label">Макс. вес</div><div class="card-value">${maxEver?maxEver+'кг':'—'}</div></div>
    <div class="card"><div class="card-label">Тоннаж всего</div><div class="card-value">${totalVol?totalVol+'кг':'—'}</div></div>
  </div>`;
  const goalTip=goal?`<div class="tip"><strong>Следующая цель:</strong> ${goal}</div>`:'';

  if (currentView==='log') {
    const setsHTML=formData.sets.map((s,i)=>`
      <div class="set-row">
        <div class="set-num">П${i+1}</div>
        <input type="number" value="${s.weight}" step="2.5" min="20" max="250" onchange="updateSet(${i},'weight',this.value)">
        <input type="number" value="${s.reps}" step="1" min="1" max="30" onchange="updateSet(${i},'reps',this.value)">
        <select onchange="updateSet(${i},'rir',this.value)">
          ${['0','1','2','3'].map(r=>`<option value="${r}" ${s.rir===r?'selected':''}>RIR ${r}</option>`).join('')}
        </select>
        <button class="del-btn" onclick="removeSet(${i})">×</button>
      </div>`).join('');

    document.getElementById('content').innerHTML=stats+goalTip+`
      <div class="form-box">
        <div style="margin-bottom:12px"><label>Дата</label>
          <input type="date" value="${formData.date}" onchange="updateDate(this.value)" style="width:auto">
        </div>
        <div class="sets-header"><span></span><span>Вес (кг)</span><span>Повторы</span><span>RIR</span><span></span></div>
        ${setsHTML}
        <div class="btn-row">
          <button class="btn" onclick="addSet()">+ подход</button>
          <button class="btn btn-primary" onclick="doSave()">Сохранить</button>
        </div>
      </div>`;
  }
  else if (currentView==='history') {
    const items=[...workouts].reverse().map(w=>{
      const pills=w.sets.map((s,i)=>
        `<div class="set-pill ${s.rir===0?'rir0':s.rir===1?'rir1':''}">${s.weight}кг × ${s.reps} · RIR${s.rir}</div>`
      ).join('');
      return `<div class="workout-item">
        <div class="workout-header">
          <div class="workout-date">${new Date(w.date+'T12:00:00').toLocaleDateString('ru-RU',{day:'2-digit',month:'long'})}</div>
          <div style="display:flex;gap:12px;align-items:center">
            <div class="workout-meta">Тоннаж: ${Math.round(w.volume)}кг</div>
            <button onclick="doDelete(${w.id})" style="border:none;background:none;color:#ccc;cursor:pointer;font-size:13px">удалить</button>
          </div>
        </div>
        <div class="set-pills">${pills}</div>
      </div>`;
    }).join('');
    document.getElementById('content').innerHTML=stats+(workouts.length?items:'<div class="empty">Нет записей. Начни с первой тренировки!</div>');
  }
  else if (currentView==='charts') {
    const sd=workouts.map(w=>({label:formatDate(w.date),maxWeight:calcMax(w.sets),volume:Math.round(w.volume)}));
    const wd=getWeeklyData().map(d=>({...d,volume:Math.round(d.volume)}));
    document.getElementById('content').innerHTML=stats+`
      <div class="chart-section"><div class="chart-title">Прогрессия веса (кг)</div>${drawLine(sd,'maxWeight','#185FA5')}</div>
      <div class="chart-section"><div class="chart-title">Тоннаж за тренировку (кг)</div>${drawBars(sd,'volume','#1D9E75')}</div>
      <div class="chart-section"><div class="chart-title">Объём по неделям (кг)</div>${drawBars(wd,'volume','#533AB7')}</div>`;
  }
}

function showToast(msg) {
  const t=document.createElement('div');
  t.textContent=msg;
  Object.assign(t.style,{position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:'#1a1a1a',color:'#fff',padding:'10px 20px',borderRadius:'8px',fontSize:'14px',zIndex:999,whiteSpace:'nowrap'});
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

function showError(msg) {
  const el=document.createElement('div');
  el.className='error-box';
  el.textContent=msg;
  document.getElementById('content').prepend(el);
  setTimeout(()=>el.remove(),4000);
}

window.setView=function(v){
  currentView=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[['log','history','charts'].indexOf(v)].classList.add('active');
  render();
};
window.updateDate=v=>{formData.date=v;render();};
window.updateSet=(i,f,v)=>{formData.sets[i][f]=v;};
window.addSet=()=>{
  const last=formData.sets[formData.sets.length-1];
  formData.sets.push({weight:last.weight,reps:last.reps,rir:'0'});
  render();
};
window.removeSet=i=>{if(formData.sets.length>1){formData.sets.splice(i,1);render();}};
window.doSave=saveWorkout;
window.doDelete=deleteWorkout;

loadWorkouts();
</script>
</body>
</html>
